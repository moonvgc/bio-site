<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Page</title>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;650;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-bg">
        <video autoplay muted loop playsinline poster="">
            <source src="background.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="container">

        <!-- Discord Profile (with socials at bottom) -->
        <div class="profile-card">
            <div class="profile-main">
                <div class="dp-avatar" id="dpAvatar">
                    <img src="" alt="" id="avatarImg">
                    <span class="dp-status" id="avatarStatusDot"></span>
                </div>
                <div class="dp-info">
                    <div class="dp-name-row">
                        <span class="dp-name" id="profileName">Loading...</span>
                    </div>
                    <span class="dp-tag" id="profileTag"></span>
                    <div class="dp-meta">
                        <span id="statusText">offline</span>
                        <span class="dp-divider"></span>
                        <span class="dp-id">1494187385058099210</span>
                        <button class="dp-copy" id="copyIdBtn" title="Copy ID">
                            <span class="iconify" data-icon="mdi:content-copy"></span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="status-bar" id="customStatus"></div>
            <div class="activity-list" id="activities"></div>
            <div class="socials-row">
                <a href="https://www.tiktok.com/@imst1llsober" class="social-icon-link" target="_blank" title="TikTok">
                    <span class="iconify" data-icon="simple-icons:tiktok"></span>
                </a>
                <a href="https://www.instagram.com/maxim133.7/" class="social-icon-link" target="_blank" title="Instagram">
                    <span class="iconify" data-icon="simple-icons:instagram"></span>
                </a>
                <a href="https://discord.com/users/1494187385058099210" class="social-icon-link" id="discordLink" title="Discord">
                    <span class="iconify" data-icon="simple-icons:discord"></span>
                </a>
                <a href="https://github.com/moonvgc" class="social-icon-link" target="_blank" title="GitHub">
                    <span class="iconify" data-icon="simple-icons:github"></span>
                </a>
                <a href="https://guns.lol/vgc" class="social-icon-link" target="_blank" title="guns.lol">
                    <img src="https://assets.guns.lol/guns_logo_no_background_cropped.png" alt="guns.lol">
                </a>
            </div>
        </div>

        <!-- Music Player -->
        <div class="music-player" id="musicPlayer">
            <div class="mp-bg" id="mpBg"></div>
            <div class="mp-content">
                <div class="mp-top">
                    <div class="mp-art">
                        <img src="" alt="" id="mpArt">
                    </div>
                    <div class="mp-info">
                        <span class="mp-track" id="mpTrack">Not playing</span>
                        <span class="mp-artist" id="mpArtist"></span>
                        <div class="mp-progress">
                            <div class="mp-bar-bg">
                                <div class="mp-bar-fill" id="mpBarFill"></div>
                            </div>
                            <div class="mp-times">
                                <span id="mpCurrent">0:00</span>
                                <span id="mpTotal">0:00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mp-lyrics" id="mpLyrics">
                    <div class="mp-lyrics-inner" id="mpLyricsInner">
                        <div class="mp-lyric-placeholder">Waiting for track...</div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Copied ID</div>

    <script>
        // ── Social hover ──
        document.querySelectorAll('.social-icon-link .iconify').forEach(el => {
            el.addEventListener('mouseenter', () => { el.style.color = '#ffffff'; });
            el.addEventListener('mouseleave', () => { el.style.color = ''; });
        });

        // ── Discord Copy ──
        document.getElementById('discordLink').addEventListener('click', (e) => {
            e.preventDefault();
            navigator.clipboard.writeText('1494187385058099210').then(() => {
                const t = document.getElementById('toast');
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 1500);
            });
        });

        document.getElementById('copyIdBtn').addEventListener('click', () => {
            navigator.clipboard.writeText('1494187385058099210').then(() => {
                const t = document.getElementById('toast');
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 1500);
            });
        });

        // ── Lanyard WebSocket ──
        const avatarImg = document.getElementById('avatarImg');
        const profileName = document.getElementById('profileName');
        const profileTag = document.getElementById('profileTag');

        const statusText = document.getElementById('statusText');
        const avatarStatusDot = document.getElementById('avatarStatusDot');
        const customStatusEl = document.getElementById('customStatus');
        const activitiesEl = document.getElementById('activities');
        const USER_ID = '1494187385058099210';

        const musicPlayer = document.getElementById('musicPlayer');
        const mpArt = document.getElementById('mpArt');
        const mpTrack = document.getElementById('mpTrack');
        const mpArtist = document.getElementById('mpArtist');
        const mpBarFill = document.getElementById('mpBarFill');
        const mpCurrent = document.getElementById('mpCurrent');
        const mpTotal = document.getElementById('mpTotal');
        const mpBg = document.getElementById('mpBg');
        const mpLyricsInner = document.getElementById('mpLyricsInner');

        let currentSongId = null;
        let currentLyrics = [];
        let progressInterval = null;
        let ws = null;
        let hbInterval = null;

        const ACTIVITY_NAMES = { 0: 'Playing', 1: 'Streaming', 2: 'Listening to', 3: 'Watching', 5: 'Competing in' };

        function fmt(sec) {
            if (!sec || !isFinite(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + String(s).padStart(2, '0');
        }

        function fetchLyrics(track, artist) {
            return fetch('https://lrclib.net/api/get?artist_name=' + encodeURIComponent(artist) + '&track_name=' + encodeURIComponent(track))
                .then(r => r.ok ? r.json() : null).catch(() => null);
        }

        function parseLRC(lrc) {
            if (!lrc) return [];
            return lrc.split('\n').map(line => {
                const m = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if (m) { const t = parseInt(m[1]) * 60 + parseFloat(m[2]), text = m[3].trim(); return text ? { time: t, text } : null; }
                return null;
            }).filter(Boolean);
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function updateMusicPlayer(spotify) {
            if (!spotify) {
                musicPlayer.classList.remove('visible');
                if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
                return;
            }
            musicPlayer.classList.add('visible');
            const songId = spotify.track_id, track = spotify.song, artist = spotify.artist;
            const artUrl = spotify.album_art_url, start = spotify.timestamps.start, end = spotify.timestamps.end;
            const durationSec = (end - start) / 1000;
            mpArt.src = artUrl; mpTrack.textContent = track; mpArtist.textContent = artist;
            mpBg.style.backgroundImage = 'url(' + artUrl + ')'; mpTotal.textContent = fmt(durationSec);

            if (songId !== currentSongId) {
                currentSongId = songId; currentLyrics = [];
                mpLyricsInner.innerHTML = '<div class="mp-lyric-placeholder">Loading lyrics...</div>';
                fetchLyrics(track, artist).then(data => {
                    if (data?.syncedLyrics) {
                        currentLyrics = parseLRC(data.syncedLyrics);
                        mpLyricsInner.innerHTML = currentLyrics.length
                            ? currentLyrics.map(l => '<div class="mp-lyric">' + escapeHtml(l.text) + '</div>').join('')
                            : '<div class="mp-lyric-placeholder">No synced lyrics</div>';
                    } else if (data?.plainLyrics) {
                        mpLyricsInner.innerHTML = '<div class="mp-lyric-placeholder">' + escapeHtml(data.plainLyrics.replace(/\n/g, '<br>')) + '</div>';
                    } else { mpLyricsInner.innerHTML = '<div class="mp-lyric-placeholder">No lyrics found</div>'; }
                }).catch(() => { mpLyricsInner.innerHTML = '<div class="mp-lyric-placeholder">Lyrics unavailable</div>'; });
            }

            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                const elapsed = Math.max(0, (Date.now() - start) / 1000);
                const pct = Math.min(100, (elapsed / durationSec) * 100);
                mpBarFill.style.width = pct + '%';
                mpCurrent.textContent = fmt(Math.min(elapsed, durationSec));
                const sec = Math.min(elapsed, durationSec);
                let activeIdx = -1;
                for (let i = currentLyrics.length - 1; i >= 0; i--) { if (sec >= currentLyrics[i].time) { activeIdx = i; break; } }
                mpLyricsInner.querySelectorAll('.mp-lyric').forEach((el, idx) => {
                    el.classList.toggle('active', idx === activeIdx);
                    if (idx === activeIdx) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
                });
            }, 200);
        }

        function activityIcon(a, spotify) {
            if (a.assets?.large_image) {
                const img = a.assets.large_image;
                if (img.startsWith('spotify:')) return 'https://i.scdn.co/image/' + img.slice(8);
                if (img.startsWith('mp:external/')) return img.slice(12);
                if (a.application_id) return 'https://cdn.discordapp.com/app-assets/' + a.application_id + '/' + img + '.png';
            }
            if (spotify?.album_art_url) return spotify.album_art_url;
            return null;
        }

        function applyStatus(d) {
            const status = d.discord_status || 'offline';
            avatarStatusDot.className = 'dp-status ' + status;
            const labels = { online: 'online', idle: 'idle', dnd: 'do not disturb', offline: 'offline' };
            statusText.textContent = labels[status] || 'offline';
            // status dot is on avatar only

            if (d.discord_user) {
                const u = d.discord_user;
                profileName.textContent = u.global_name || u.username;
                profileTag.textContent = '@' + u.username;
                if (u.avatar) avatarImg.src = 'https://cdn.discordapp.com/avatars/' + USER_ID + '/' + u.avatar + '.png?size=128';
            }

            const custom = d.activities?.find(a => a.type === 4);
            if (custom?.state) {
                let html = '';
                if (custom.emoji) {
                    if (custom.emoji.id) {
                        const ext = custom.emoji.animated ? 'gif' : 'png';
                        html += '<img class="status-emoji" src="https://cdn.discordapp.com/emojis/' + custom.emoji.id + '.' + ext + '">';
                    } else if (custom.emoji.name) { html += '<span class="status-emoji">' + custom.emoji.name + '</span>'; }
                }
                html += custom.state.replace(/<a?:(\w+):(\d+)>/g, (_, name, id) =>
                    '<img class="status-emoji" src="https://cdn.discordapp.com/emojis/' + id + '.png">');
                customStatusEl.innerHTML = html; customStatusEl.style.display = 'flex';
            } else { customStatusEl.innerHTML = ''; customStatusEl.style.display = 'none'; }

            const spotify = d.spotify;
            updateMusicPlayer(spotify);

            activitiesEl.innerHTML = '';
            const others = d.activities?.filter(a => a.type !== 4 && !(a.name === 'Spotify' && a.type === 2)) || [];
            for (const a of others) {
                const el = document.createElement('div'); el.className = 'activity-item';
                const icon = activityIcon(a, null);
                if (icon) { const img = document.createElement('img'); img.className = 'activity-icon'; img.src = icon; img.alt = ''; el.appendChild(img); }
                else {
                    const fb = document.createElement('span'); fb.className = 'activity-icon-fallback iconify';
                    const ICONS = { 0: 'mdi:gamepad-variant-outline', 1: 'mdi:broadcast', 2: 'mdi:music', 3: 'mdi:television', 5: 'mdi:trophy' };
                    fb.setAttribute('data-icon', ICONS[a.type] || 'mdi:gamepad-variant'); el.appendChild(fb);
                }
                const text = document.createElement('div'); text.className = 'activity-text';
                const l1 = document.createElement('div'); l1.className = 'activity-line1'; l1.textContent = (ACTIVITY_NAMES[a.type] || '') + ' ' + a.name;
                const l2 = document.createElement('div'); l2.className = 'activity-line2'; l2.textContent = [a.details, a.state].filter(Boolean).join(' — ');
                text.appendChild(l1); text.appendChild(l2); el.appendChild(text);
                activitiesEl.appendChild(el);
            }
        }

        function connectWS() {
            if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
            try {
                ws = new WebSocket('wss://api.lanyard.rest/socket');
                ws.onopen = () => ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: USER_ID } }));
                ws.onmessage = (e) => {
                    try {
                        const msg = JSON.parse(e.data);
                        if (msg.op === 0 && msg.d) applyStatus(msg.d);
                        if (msg.op === 1 && msg.d?.heartbeat_interval) {
                            clearInterval(hbInterval);
                            hbInterval = setInterval(() => { if (ws?.readyState === 1) ws.send(JSON.stringify({ op: 3 })); }, msg.d.heartbeat_interval);
                        }
                        if (msg.op === 3 && ws?.readyState === 1) ws.send(JSON.stringify({ op: 3 }));
                    } catch (err) { console.warn('WS error:', err); }
                };
                ws.onclose = () => { clearInterval(hbInterval); ws = null; setTimeout(connectWS, 3000); };
                ws.onerror = () => { if (ws) ws.close(); };
            } catch { setTimeout(connectWS, 3000); }
        }
        connectWS();
    </script>

</body>
</html>
